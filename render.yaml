services:
  - type: web
    name: image-processor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn App:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    healthCheckPath: / 
    disk:
      name: image-uploads
      mountPath: /uploads
      sizeGB: 1